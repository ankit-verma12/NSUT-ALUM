{% extends "base.html" %}
{% block title %}Forum - NALUM Mentorship{% endblock %}
{% block content %}
<div class="forum-header">
  <h1 class="page-title">Discussion Forum</h1>
  <button id="new-post-btn" class="btn">New Post</button>
</div>

<form id="post-form" class="form card hidden">
  <label>Title
    <input type="text" id="post-title" required>
  </label>
  <label>Author
    <input type="text" id="post-author" required>
  </label>
  <label>Body
    <textarea id="post-body" rows="5" required></textarea>
  </label>
  <button type="submit" class="btn">Publish Post</button>
</form>
<div id="post-message" class="message"></div>

<div id="post-list" class="post-list"></div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/forum.js') }}"></script>
{% endblock %}
